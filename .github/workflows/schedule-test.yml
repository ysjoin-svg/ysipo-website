name: Schedule Test

# 臨時排程測試：每 5 分鐘觸發一次（GitHub 最短間隔），只記錄觸發時間，不發文。
# 測完即移除此檔。
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Record trigger time
        run: |
          echo "==============================================="
          echo "Schedule test triggered"
          echo "  event   = ${{ github.event_name }}"
          echo "  UTC now = $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "==============================================="
