name: Weekly Article Publish

# 每週一台北時間 09:00 自動產生一篇智財文章（含 AI 配圖）並發佈
on:
  schedule:
    - cron: '0 1 * * 1'   # UTC 週一 01:00 = 台北 週一 09:00
  workflow_dispatch: {}    # 允許在 Actions 頁面手動觸發測試

permissions:
  contents: write          # 讓內建 GITHUB_TOKEN 能 push 回 repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate and publish article
        working-directory: scripts
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node generate-article.js

      - name: 寄送執行結果通知（成功 / 失敗都寄）
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: 永旭自動發文 <${{ secrets.MAIL_USERNAME }}>
          to: taiejoin@hotmail.com
          subject: ${{ job.status == 'success' && '[永旭] 自動發文成功' || '[永旭] 自動發文失敗，請檢查' }}
          body: |
            永旭網站每週自動發文 workflow 執行完成。

            結果：${{ job.status }}
            詳細紀錄：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            若結果為 success，新文章已發佈：https://ysipo.com.tw/insights.html
            若結果為 failure，請點上方連結查看錯誤原因。
