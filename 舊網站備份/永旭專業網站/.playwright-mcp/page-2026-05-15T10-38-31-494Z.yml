    - region "Committed to IP Excellence" [ref=e35]:
      - generic [ref=e38]:
        - generic [ref=e39]: Our Story
        - heading "Committed to IP Excellence" [level=2] [ref=e40]
        - paragraph [ref=e42]: Yong Syu Intellectual Property Office was founded in 2010 by Dr. Li Tsung-Ying, an Electronics Engineering PhD whose IP practice began in 2001. What started as a Kaohsiung-based firm has grown into a dual-office operation spanning southern and northern Taiwan, with a client base that extends to over 50 countries worldwide.
        - paragraph [ref=e43]: "Our philosophy is simple: boutique quality, partner-level attention. Every matter is handled directly by one of our two principals. We do not delegate client work to junior staff. This commitment to personal accountability has earned YSIPO a consistent position among Taiwan's Top-20 trademark applicant firms and a strong reputation in patent prosecution across multiple technology domains."
        - paragraph [ref=e44]: From semiconductor patents to brand protection for consumer goods, from Taiwan-only filings to coordinated global portfolios — YSIPO brings deep technical and legal expertise to every engagement, with the responsiveness and personal attention that only a boutique firm can offer.
