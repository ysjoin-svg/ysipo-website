            - generic [ref=e226]:
              - generic [ref=e227]: 專利知識
              - heading "申請發明專利前，為什麼一定要做前案檢索？" [level=3] [ref=e228]
              - paragraph [ref=e229]: 許多發明人急於提出申請，卻忽略了前案檢索的重要性。事先確認技術的新穎性，不僅能節省大量申請費用，更能幫助撰寫出保護範圍更完整的專利說明書。
