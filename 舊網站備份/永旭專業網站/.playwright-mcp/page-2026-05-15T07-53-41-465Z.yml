                - text: 閱讀更多
                - img [ref=e234]
          - article [ref=e236]:
            - generic [ref=e238]: ™️
            - generic [ref=e239]:
              - generic [ref=e240]: 商標知識
              - heading "商標被核駁先行通知，真的就沒救了嗎？" [level=3] [ref=e241]
              - paragraph [ref=e242]: 商標核駁不等於終局決定。透過識別性論述、使用證據舉證、商品服務區隔等策略，許多被認為不可能核准的商標仍有機會在申復階段成功爭取。
              - generic [ref=e243]:
                - time [ref=e244]: 2026-05-15
                - generic [ref=e245]: 6 分鐘閱讀
              - link "閱讀更多" [ref=e246] [cursor=pointer]:
