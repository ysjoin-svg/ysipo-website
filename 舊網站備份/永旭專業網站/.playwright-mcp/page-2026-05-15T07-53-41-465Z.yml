    - region "為什麼選擇永旭" [ref=e131]:
      - generic [ref=e132]:
        - generic [ref=e133]:
          - generic [ref=e134]: Why Choose YSIPO
          - heading "為什麼選擇永旭" [level=2] [ref=e135]
          - paragraph [ref=e137]: 25 年的積累，讓我們成為您最值得信賴的智財合作夥伴
        - generic [ref=e138]:
          - generic [ref=e139]:
            - img [ref=e141]
            - generic [ref=e143]:
              - heading "博士主持・技術深度" [level=3] [ref=e144]
              - paragraph [ref=e145]: 李宗穎所長為國立高雄科技大學電子工程博士，並受過工業技術研究院完整的專利說明書撰稿專業訓練。橫跨電子、半導體、通訊、機械、軟體及生醫等多元技術領域的深厚背景，能精準解析複雜技術創新，撰寫具備強保護力的專利說明書。
          - generic [ref=e146]:
            - img [ref=e148]
            - generic [ref=e150]:
              - heading "商標全生命週期實戰力" [level=3] [ref=e151]
              - paragraph [ref=e152]: 逾 25 年商標實務積累，從申請前評估、核駁救援、異議答辯、評定廢止，到侵權處理與訴訟協助，掌握商標全生命週期的實戰能力。許多被認為「不可能核准」的商標，經永旭策略性識別性論述後成功爭取核准，我們以實戰力守護您的品牌。
          - generic [ref=e153]:
            - img [ref=e155]
            - generic [ref=e157]:
              - heading "前 20 大實績・諮詢顧問級" [level=3] [ref=e158]
              - paragraph [ref=e159]: 永旭事務所曾多次榮獲台灣商標申請量前 20 大事務所殊榮。李宗穎所長亦長期擔任業界商標爭議的諮詢顧問，並受邀至大專院校、公家機關、社會團體及企業擔任智慧財產權主題講師，以深度的專業見解服務每一位客戶。
          - generic [ref=e160]:
            - img [ref=e162]
            - generic [ref=e164]:
              - heading "全球佈局・負責人親自承辦" [level=3] [ref=e165]
              - paragraph [ref=e166]: 透過歐盟商標、馬德里體系、PCT 國際專利等機制，服務範圍涵蓋兩岸三地、東南亞、歐美主要市場。所長與台北所負責人架構，所長與台北所負責人親自把關每一個案件，確保專業判斷不打折、客戶權益不外包。
