          - article [ref=e249]:
            - generic [ref=e251]: ©️
            - generic [ref=e252]:
              - generic [ref=e253]: 著作權知識
              - heading "著作權自動產生，為什麼還需要辦理著作權登記？" [level=3] [ref=e254]
              - paragraph [ref=e255]: 著作權雖然創作完成後即自動受到保護，但辦理登記可以建立創作時間的法律佐證。當發生侵權爭議時，登記文件將成為維權的重要武器。
              - generic [ref=e256]:
